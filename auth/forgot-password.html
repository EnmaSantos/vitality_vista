<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Fitness App</title>
    <link rel="stylesheet" href="../styles/base/global.css"> <!-- Base/global styles -->
    <link rel="stylesheet" href="../styles/pages/forgot-password.css"> <!-- Forgot Password page-specific styles -->
</head>

<body id="forgot-password">
    <main>
        <section class="forgot-password-form">
            <h2>Reset Your Password</h2>
            <p>Please enter your email address. We will send you an email to reset your password.</p>
            <form id="forgotPasswordForm" action="reset-password.html" method="post">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <div id="error-message" style="color: red;"></div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>
            <p>Remembered your password? <a href="login.html">Login</a></p>
        </section>
    </main>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(event) {
            const email = document.getElementById('email').value;
            const errorMessage = document.getElementById('error-message');

            errorMessage.textContent = '';

            if (!email.includes('@')) {
                errorMessage.textContent = 'Invalid email address.';
                event.preventDefault();
            }
        });
    </script>
</body>

</html>
