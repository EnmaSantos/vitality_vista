<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/global.css"> <!-- Base/global styles -->
    <link rel="stylesheet" href="styles/navbar.css"> <!-- Navbar-specific styles -->
    <link rel="stylesheet" href="styles/food-log.css"> <!-- Food log-specific styles -->
    <title>Food-Log - Fitness App</title>
</head>

<body id="food-log">
    <div id="navbar-placeholder"></div>
    <main>
        <!-- food-log.html -->
        <div class="food-log-container">
            <section class="food-search">
                <input type="text" placeholder="Search for food items..." class="search-bar">
                <button class="add-food-button">Add Food</button>
            </section>

            <section class="daily-summary">
                <h2>Daily Summary</h2>
                <p>Calories: <span>1500 / 2000 kcal</span></p>
                <p>Protein: <span>80g</span> | Carbs: <span>200g</span> | Fats: <span>50g</span></p>
            </section>

            <section class="meal-section" id="breakfast">
                <h3>Breakfast</h3>
                <ul class="meal-list">
                    <li class="meal-item">
                        <span>Oatmeal</span>
                        <span>200 kcal | 5g protein | 30g carbs | 4g fat</span>
                    </li>
                    <li class="meal-item">
                        <span>Banana</span>
                        <span>90 kcal | 1g protein | 23g carbs | 0.3g fat</span>
                    </li>
                </ul>
            </section>

            <!-- Additional meal sections for lunch, dinner, and snacks -->
        </div>
    </main>
<script src="scripts/load-navbar.js"></script>
<div id="footer-placeholder"></div>
<script src="scripts/load-footer.js"></script>
</body>


</html>
