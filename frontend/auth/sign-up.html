<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fitness App</title>
    <link rel="stylesheet" href="../styles/base/global.css"> <!-- Base/global styles -->
    <link rel="stylesheet" href="../styles/pages/sign-up.css"> <!-- Sign-up page-specific styles -->
</head>

<body id="signup">
    <main>
        <section class="signup-form">
            <h2>Create Your Account</h2>
            <form id="signupForm" action="/signup" method="POST">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>

                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required><br>

                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required><br>

                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required><br>

                <label for="gender">Gender:</label>
                <input type="text" id="gender" name="gender" required><br>

                <label for="phoneNumber">Phone Number:</label>
                <input type="text" id="phoneNumber" name="phoneNumber" required><br>

                <div id="error-message" style="color: red;"></div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </section>
    </main>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const errorMessage = document.getElementById('error-message');

            errorMessage.textContent = '';

            if (username.length < 3) {
                errorMessage.textContent = 'Username must be at least 3 characters long.';
            } else if (!email.includes('@')) {
                errorMessage.textContent = 'Invalid email address.';
            } else if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters long.';
            } else if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match.';
            } else {
                try {
                    const response = await fetch('/api/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            username, 
                            email, 
                            password,
                            firstName,
                            lastName,
                            age,
                            gender,
                            phoneNumber
                        })
                    });
                    if (response.ok) {
                        // ...handle success (redirect or message)...
                    } else {
                        errorMessage.textContent = 'Signup failed.';
                    }
                } catch (err) {
                    errorMessage.textContent = 'Error occurred.';
                }
            }
        });
    </script>
</body>

</html>
