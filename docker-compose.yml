services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vitality_vista
      POSTGRES_USER: vitality_vista
      POSTGRES_PASSWORD: vitality_vista
    ports:
      - "5432:5432"
    volumes:
      - vitality_vista_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitality_vista -d vitality_vista"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vitality_vista_postgres:

